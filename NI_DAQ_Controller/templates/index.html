<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NI DAQ Controller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e; color: #e0e0e0; min-height: 100vh;
        }
        .navbar {
            background: #16213e; padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #0f3460;
        }
        .navbar h1 { font-size: 20px; color: #00d4ff; }
        .navbar .status { font-size: 13px; color: #888; }
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge.connected { background: #1b5e20; color: #69f0ae; }
        .badge.disconnected { background: #b71c1c; color: #ff8a80; }
        .badge.ethernet { background: #0d47a1; }
        .badge.usb { background: #33691e; }
        .badge.pxi { background: #4a148c; }

        .container { max-width: 1400px; margin: 0 auto; padding: 16px; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
        .tabs-chassis { margin-bottom: 0; }
        .tab-btn {
            padding: 10px 20px; background: #16213e; border: none;
            color: #888; cursor: pointer; border-radius: 6px 6px 0 0;
            font-size: 14px; transition: all 0.2s;
        }
        .tab-btn:hover { background: #1a2747; color: #ccc; }
        .tab-btn.active { background: #0f3460; color: #00d4ff; font-weight: bold; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .tab-panel-chassis { display: none; }
        .tab-panel-chassis.active { display: block; }

        .tabs-module {
            display: flex; gap: 4px; margin: 12px 0 16px; flex-wrap: wrap;
            padding: 8px 0; border-bottom: 1px solid #0f3460;
        }
        .tab-btn-module {
            padding: 8px 14px; background: #1a2747; border: 1px solid #0f3460;
            color: #aaa; cursor: pointer; border-radius: 4px; font-size: 13px;
        }
        .tab-btn-module:hover { background: #243352; color: #ddd; }
        .tab-btn-module.active { background: #0f3460; color: #00d4ff; border-color: #00d4ff; font-weight: bold; }
        .tab-panel-module { display: none; }
        .tab-panel-module.active { display: block; }

        .chassis-header {
            background: #16213e; border-radius: 8px; padding: 14px 18px;
            margin-bottom: 8px; border-left: 4px solid #4caf50;
        }
        .device-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
        .device-name { font-size: 16px; font-weight: bold; color: #fff; }
        .device-type { color: #888; font-size: 13px; }
        .device-details { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: #aaa; }
        .module-meta { color: #888; font-size: 12px; margin-bottom: 12px; }

        .channel-list { display: flex; flex-direction: column; gap: 8px; max-height: 65vh; overflow-y: auto; }
        .channel-row {
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
            background: #16213e; padding: 10px 14px; border-radius: 6px;
            border: 1px solid #0f3460;
        }
        .channel-name { font-family: 'Courier New', monospace; font-weight: bold; color: #00d4ff; min-width: 72px; }
        .channel-type { font-size: 11px; padding: 3px 8px; border-radius: 3px; background: #0d1b2a; color: #aaa; }
        .channel-type.read { color: #69f0ae; }
        .channel-type.write { color: #ffa726; }
        .channel-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex: 1; }
        .channel-value {
            min-width: 120px; font-family: 'Courier New', monospace; font-size: 13px;
            color: #69f0ae; padding: 4px 8px; background: #0d1b2a; border-radius: 4px;
        }
        .ao-ac-fields { display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap; }

        input, select {
            background: #0d1b2a; border: 1px solid #0f3460; color: #fff;
            padding: 6px 10px; border-radius: 4px; font-size: 13px;
        }
        input:focus, select:focus { outline: none; border-color: #00d4ff; }
        input.ao-input[type="number"] { -moz-appearance: textfield; width: 80px; }
        input.ao-input[type="number"]::-webkit-outer-spin-button,
        input.ao-input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }

        button {
            padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer;
            font-size: 13px; font-weight: bold; transition: all 0.2s;
        }
        button:hover { opacity: 0.85; }
        .btn-primary { background: #1565c0; color: white; }
        .btn-success { background: #2e7d32; color: white; }
        .btn-danger { background: #c62828; color: white; }
        .btn-warning { background: #ef6c00; color: white; }
        .btn-secondary { background: #37474f; color: white; }

        .log-container {
            background: #0d1b2a; border-radius: 6px; padding: 12px;
            height: 300px; overflow-y: auto; font-family: 'Courier New', monospace;
            font-size: 12px; line-height: 1.5;
        }
        .log-entry { margin: 2px 0; }
        .log-info { color: #69f0ae; }
        .log-warning { color: #ffd54f; }
        .log-error { color: #ef9a9a; }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            padding: 12px 24px; border-radius: 6px; color: white;
            font-weight: bold; display: none; z-index: 1000;
        }
        .toast.success { background: #2e7d32; }
        .toast.error { background: #c62828; }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid #0f3460; border-top-color: #00d4ff;
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .container { padding: 8px; }
            .channel-controls { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div>
            <h1>🔧 NI DAQ Controller</h1>
            <div class="status" id="statusBar">Initializing...</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <span id="deviceCount" style="font-size:13px;color:#888;">Devices: 0</span>
            <button class="btn-primary" onclick="refreshDevices(true)">🔄 Refresh</button>
        </div>
    </nav>

    <div class="container">
        <div class="tabs tabs-chassis" id="tabContainer">
            <button class="tab-btn active" onclick="switchChassisTab('dashboard', this)">📊 Dashboard</button>
        </div>
        
        <div id="dashboard" class="tab-panel active">
            <div id="deviceCards"></div>
            <div style="margin-top:16px;">
                <h3 style="color:#00d4ff;margin-bottom:8px;">📝 System Log</h3>
                <div class="log-container" id="logContainer"></div>
            </div>
        </div>
        
        <div id="devicePanels"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentTab = 'dashboard';
        let devicesLoaded = false;
        window._deviceStore = [];

        document.addEventListener('DOMContentLoaded', () => loadDevices());

        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = `toast ${type}`; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function switchChassisTab(tabId, btn) {
            currentTab = tabId;
            document.querySelectorAll('#tabContainer .tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel, .tab-panel-chassis').forEach(p => p.classList.remove('active'));
            if (btn) btn.classList.add('active');
            const panel = document.getElementById(tabId);
            if (panel) panel.classList.add('active');
            if (tabId !== 'dashboard') {
                const firstMod = panel?.querySelector('.tab-btn-module');
                if (firstMod) firstMod.click();
            }
        }

        function switchModuleTab(chassisIdx, moduleIdx, btn) {
            const chassisPanel = document.getElementById(`chassis-${chassisIdx}`);
            if (!chassisPanel) return;
            chassisPanel.querySelectorAll('.tab-btn-module').forEach(b => b.classList.remove('active'));
            chassisPanel.querySelectorAll('.tab-panel-module').forEach(p => p.classList.remove('active'));
            if (btn) btn.classList.add('active');
            const modPanel = document.getElementById(`chassis-${chassisIdx}-mod-${moduleIdx}`);
            if (modPanel) modPanel.classList.add('active');
        }

        async function apiCall(endpoint, method='GET', body=null, timeoutMs=8000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const opts = { method, headers: {'Content-Type': 'application/json'}, signal: controller.signal };
                if (body) opts.body = JSON.stringify(body);
                const resp = await fetch(endpoint, opts);
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'API error');
                return data;
            } catch (e) {
                const msg = e.name === 'AbortError' ? 'Request timed out' : e.message;
                showToast(msg, 'error');
                return null;
            } finally {
                clearTimeout(timer);
            }
        }

        async function loadDevices() {
            const data = await apiCall('/api/devices');
            if (data) applyDeviceData(data);
        }

        async function refreshDevices(rescan = false) {
            if (rescan) {
                document.getElementById('deviceCount').innerHTML = 'Devices: <span class="spinner"></span>';
                document.getElementById('statusBar').textContent = 'Scanning hardware…';
            }
            const url = rescan ? '/api/devices?refresh=1' : '/api/devices';
            const data = await apiCall(url, 'GET', null, rescan ? 15000 : 8000);
            if (!data) {
                if (rescan) {
                    document.getElementById('deviceCount').textContent = 'Devices: 0';
                    document.getElementById('statusBar').textContent = 'Scan failed';
                }
                return;
            }
            applyDeviceData(data);
            if (rescan) showToast(`Scan complete: ${data.devices.length} device(s)`);
        }

        function applyDeviceData(data) {
            document.getElementById('deviceCount').textContent = `Devices: ${data.devices.length}`;
            document.getElementById('statusBar').textContent = data.status;
            window._lastDiscoveryHints = data.hints || [];
            window._deviceStore = data.devices || [];
            renderDashboard(data.devices);
            if (!devicesLoaded || data.devices.length > 0) {
                renderChassisTabs(data.devices);
                devicesLoaded = true;
            }
            updateLog(data.log);
        }

        function renderDashboard(devices) {
            const container = document.getElementById('deviceCards');
            if (devices.length === 0) {
                const hints = (window._lastDiscoveryHints || []).map(h => `<p style="margin-top:8px;font-size:13px;color:#aaa;">${h}</p>`).join('');
                container.innerHTML = `
                    <div style="text-align:center;padding:40px;color:#666;">
                        <div style="font-size:48px;margin-bottom:16px;">🔌</div>
                        <h3>No NI DAQ Devices Detected</h3>
                        <p style="margin-top:8px;font-size:13px;color:#aaa;">
                            Add and reserve the cDAQ in NI MAX, then click <strong>Refresh</strong>.
                        </p>
                        ${hints}
                        <div style="margin-top:20px;padding:16px;background:#16213e;border-radius:8px;text-align:left;max-width:520px;margin-left:auto;margin-right:auto;">
                            <h4 style="color:#00d4ff;margin-bottom:8px;">Add Ethernet cDAQ (optional)</h4>
                            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:6px 0;">
                                <label>IP:</label>
                                <input type="text" id="netDeviceIp" placeholder="169.254.x.x" style="width:200px;">
                                <button class="btn-primary" onclick="addNetworkDevice()">➕ Add</button>
                            </div>
                        </div>
                    </div>`;
                return;
            }
            container.innerHTML = `
                <div style="padding:16px 20px;background:#16213e;border-radius:8px;border-left:4px solid #4caf50;">
                    <p style="font-size:14px;color:#ccc;">
                        <strong style="color:#69f0ae;">${devices.length}</strong> chassis detected.
                        Use <strong>Chassis</strong> tabs → <strong>NI Device</strong> → per-channel Read/Write.
                    </p>
                </div>`;
        }

        function shortChannelName(ch) {
            return (ch.split('/').pop() || ch).replace(/^line/, 'P');
        }

        function moduleHasChannels(mod) {
            return mod.ai_channels?.length || mod.ao_channels?.length ||
                mod.di_channels?.length || mod.do_channels?.length;
        }

        function renderAoChannelRow(di, mi, ci, channel, mod) {
            const aoUnit = mod.ao_output_unit === 'current' ? 'mA' : 'V';
            const rmsLabel = aoUnit === 'mA' ? 'Irms' : 'Vrms';
            const aoDefault = mod.ao_output_unit === 'current' ? '4.0' : '1.0';
            const id = `${di}_${mi}_ao_${ci}`;
            return `
            <div class="channel-row" data-channel="${channel}" data-ao-unit="${aoUnit}">
                <span class="channel-name">${shortChannelName(channel)}</span>
                <span class="channel-type write">WRITE</span>
                <div class="channel-controls">
                    <select id="ao_sig_${id}" onchange="updateAoChannelControls('${id}')">
                        <option>DC</option><option>AC</option>
                    </select>
                    <span id="ao_dc_${id}">
                        <label style="font-size:12px;color:#aaa;">Value (${aoUnit}):</label>
                        <input type="number" class="ao-input" id="ao_set_${id}" value="${aoDefault}" step="any" min="0">
                    </span>
                    <span id="ao_ac_${id}" class="ao-ac-fields" style="display:none;">
                        <label style="font-size:12px;color:#aaa;">Mode:</label>
                        <select id="ao_valmode_${id}">
                            <option value="direct">Direct</option>
                            <option value="vrms">${rmsLabel}</option>
                        </select>
                        <label style="font-size:12px;color:#aaa;">Value (${aoUnit}):</label>
                        <input type="number" class="ao-input" id="ao_amp_${id}" value="${aoDefault}" step="any" min="0">
                        <label style="font-size:12px;color:#aaa;">Hz:</label>
                        <input type="number" class="ao-input" id="ao_freq_${id}" value="60" min="1" style="width:70px;">
                        <label style="font-size:12px;color:#aaa;">Wave:</label>
                        <select id="ao_wf_${id}">
                            <option>Sine</option><option>Square</option><option>Triangle</option><option>Sawtooth</option>
                        </select>
                    </span>
                    <button class="btn-warning" onclick="writeAO(${di},${mi},'${id}')">Write</button>
                </div>
                <span class="channel-value" id="ao_status_${id}">--</span>
            </div>`;
        }

        function renderModuleChannels(di, mi, mod) {
            let html = '';
            (mod.ai_channels || []).forEach((ch, ci) => {
                const id = `${di}_${mi}_ai_${ci}`;
                html += `
                <div class="channel-row" data-channel="${ch}">
                    <span class="channel-name">${shortChannelName(ch)}</span>
                    <span class="channel-type read">READ</span>
                    <div class="channel-controls">
                        <button class="btn-success" onclick="readAIChannel(${di},${mi},'${id}')">Read</button>
                    </div>
                    <span class="channel-value" id="val_${id}">-- V</span>
                </div>`;
            });
            (mod.ao_channels || []).forEach((ch, ci) => {
                html += renderAoChannelRow(di, mi, ci, ch, mod);
            });
            (mod.di_channels || []).forEach((ch, ci) => {
                const id = `${di}_${mi}_di_${ci}`;
                html += `
                <div class="channel-row" data-channel="${ch}">
                    <span class="channel-name">${shortChannelName(ch)}</span>
                    <span class="channel-type read">READ</span>
                    <div class="channel-controls">
                        <button class="btn-success" onclick="readDIChannel(${di},${mi},'${id}')">Read</button>
                    </div>
                    <span class="channel-value" id="val_${id}">--</span>
                </div>`;
            });
            (mod.do_channels || []).forEach((ch, ci) => {
                const id = `${di}_${mi}_do_${ci}`;
                html += `
                <div class="channel-row" data-channel="${ch}">
                    <span class="channel-name">${shortChannelName(ch)}</span>
                    <span class="channel-type write">WRITE</span>
                    <div class="channel-controls">
                        <button class="btn-secondary" onclick="toggleDOChannel(${di},${mi},'${id}')">Toggle</button>
                    </div>
                    <span class="channel-value" id="val_${id}">--</span>
                </div>`;
            });
            return html || '<p style="color:#888;padding:12px;">No channels on this module.</p>';
        }

        function renderChassisTabs(devices) {
            const tabContainer = document.getElementById('tabContainer');
            const panelsContainer = document.getElementById('devicePanels');
            tabContainer.querySelectorAll('.tab-btn:not(:first-child)').forEach(e => e.remove());
            panelsContainer.innerHTML = '';

            devices.forEach((device, di) => {
                const chassisId = `chassis-${di}`;
                const modules = (device.modules || [])
                    .map((mod, origIdx) => ({ mod, origIdx }))
                    .filter(({ mod }) => moduleHasChannels(mod));

                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.textContent = `🔌 Chassis ${di + 1}`;
                btn.title = device.name;
                btn.onclick = () => switchChassisTab(chassisId, btn);
                tabContainer.appendChild(btn);

                let moduleTabsHtml = '';
                let modulePanelsHtml = '';
                modules.forEach(({ mod, origIdx: mi }, displayIdx) => {
                    const modId = `chassis-${di}-mod-${mi}`;
                    const active = displayIdx === 0 ? 'active' : '';
                    moduleTabsHtml += `
                        <button class="tab-btn-module ${active}" onclick="switchModuleTab(${di},${mi}, this)">
                            NI Device ${displayIdx + 1}
                            <span style="color:#666;font-weight:normal;">(${mod.product_type || mod.name})</span>
                        </button>`;
                    modulePanelsHtml += `
                        <div id="${modId}" class="tab-panel-module ${active}">
                            <div class="module-meta">${mod.name} · Slot ${mod.slot_number} · ${mod.product_type}</div>
                            <div class="channel-list">${renderModuleChannels(di, mi, mod)}</div>
                        </div>`;
                });

                const panel = document.createElement('div');
                panel.id = chassisId;
                panel.className = 'tab-panel-chassis';
                panel.innerHTML = `
                    <div class="chassis-header">
                        <div class="device-header">
                            <span class="badge ${device.connection_type.toLowerCase()}">${device.connection_type}</span>
                            <span class="device-name">${device.name}</span>
                            <span class="device-type">${device.product_type}</span>
                            <span class="badge ${device.status === 'Connected' ? 'connected' : 'disconnected'}">${device.status}</span>
                        </div>
                        <div class="device-details" style="margin-top:8px;">
                            ${device.serial_number ? `<span>S/N: ${device.serial_number}</span>` : ''}
                            ${device.ip_address ? `<span>IP: ${device.ip_address}</span>` : ''}
                            <span>Modules: ${modules.length}</span>
                        </div>
                    </div>
                    ${modules.length ? `
                        <div class="tabs-module">${moduleTabsHtml}</div>
                        ${modulePanelsHtml}
                    ` : '<p style="color:#888;padding:16px;">No I/O modules on this chassis.</p>'}
                `;
                panelsContainer.appendChild(panel);
            });

            if (devices.length > 0 && currentTab === 'dashboard') {
                const first = tabContainer.querySelector('.tab-btn:not(:first-child)');
                if (first) first.click();
            }
        }

        function updateAoChannelControls(id) {
            const signal = document.getElementById(`ao_sig_${id}`).value;
            document.getElementById(`ao_dc_${id}`).style.display = signal === 'DC' ? 'inline-flex' : 'none';
            document.getElementById(`ao_ac_${id}`).style.display = signal === 'AC' ? 'inline-flex' : 'none';
        }

        function updateLog(entries) {
            const container = document.getElementById('logContainer');
            if (!entries?.length) return;
            entries.slice(-50).forEach(e => {
                const div = document.createElement('div');
                div.className = `log-entry log-${(e.level||'info').toLowerCase()}`;
                div.textContent = `[${e.time}] ${e.message}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function channelFromId(id) {
            const el = document.getElementById(`ao_sig_${id}`) || document.getElementById(`val_${id}`);
            return el?.closest('.channel-row')?.dataset?.channel;
        }

        function formatAppliedOutput(result, signal, id) {
            const unit = result.unit || 'V';
            const val = result.applied_value;
            if (val === null || val === undefined) return '--';
            let text = `${val} ${unit}`;
            if (signal === 'AC') {
                const freq = document.getElementById(`ao_freq_${id}`).value;
                const wf = document.getElementById(`ao_wf_${id}`).value;
                text += ` @ ${freq} Hz ${wf}`;
            }
            return text;
        }

        async function readAIChannel(di, mi, id) {
            const channel = channelFromId(id);
            const result = await apiCall('/api/ai/read', 'POST', {
                device_idx: di, module_idx: mi, channels: [channel], rate: 1000, samples: 1
            });
            if (result) document.getElementById(`val_${id}`).textContent = result.values?.[0] || '--';
        }

        async function writeAO(di, mi, id) {
            const channel = channelFromId(id);
            const signal = document.getElementById(`ao_sig_${id}`).value;
            const value_mode = signal === 'DC' ? 'direct' : (document.getElementById(`ao_valmode_${id}`)?.value || 'direct');
            let value, freq, wf, amp;
            if (signal === 'DC') {
                value = parseFloat(document.getElementById(`ao_set_${id}`).value);
                freq = 0; wf = 'Sine'; amp = value;
            } else {
                value = 0;
                freq = parseFloat(document.getElementById(`ao_freq_${id}`).value);
                wf = document.getElementById(`ao_wf_${id}`).value;
                amp = parseFloat(document.getElementById(`ao_amp_${id}`).value);
            }
            const result = await apiCall('/api/ao/start', 'POST', {
                device_idx: di, module_idx: mi, channel, signal, value_mode,
                value, frequency: freq, waveform: wf, amplitude: amp
            });
            if (result) {
                const text = formatAppliedOutput(result, signal, id);
                showToast(`Written: ${shortChannelName(channel)} = ${text}`);
                document.getElementById(`ao_status_${id}`).textContent = text;
            }
        }

        async function readDIChannel(di, mi, id) {
            const channel = channelFromId(id);
            const result = await apiCall('/api/di/read', 'POST', { device_idx: di, module_idx: mi, channel });
            if (result) document.getElementById(`val_${id}`).textContent = result.values?.[0] || '--';
        }

        async function toggleDOChannel(di, mi, id) {
            const channel = channelFromId(id);
            const result = await apiCall('/api/do/toggle', 'POST', { device_idx: di, module_idx: mi, channel });
            if (result) {
                const text = result.state ? 'HIGH' : 'LOW';
                document.getElementById(`val_${id}`).textContent = text;
                showToast(`${shortChannelName(channel)}: ${text}`);
            }
        }

        async function addNetworkDevice() {
            const ip = document.getElementById('netDeviceIp')?.value?.trim();
            if (!ip) { showToast('Enter IP address', 'error'); return; }
            const result = await apiCall('/api/devices/add-network', 'POST', {
                ip_or_hostname: ip, attempt_reservation: true
            }, 15000);
            if (result) {
                showToast(`Added ${result.device_name || ip}`);
                applyDeviceData(result);
                devicesLoaded = true;
            }
        }
    </script>
</body>
</html>
