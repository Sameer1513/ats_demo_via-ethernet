<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NI DAQ Controller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e; color: #e0e0e0; min-height: 100vh;
        }
        .navbar {
            background: #16213e; padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #0f3460;
        }
        .navbar h1 { font-size: 20px; color: #00d4ff; }
        .navbar .status { font-size: 13px; color: #888; }
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge.connected { background: #1b5e20; color: #69f0ae; }
        .badge.disconnected { background: #b71c1c; color: #ff8a80; }
        .badge.ethernet { background: #0d47a1; }
        .badge.usb { background: #33691e; }
        .badge.pxi { background: #4a148c; }

        .container { max-width: 1400px; margin: 0 auto; padding: 16px; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-btn {
            padding: 10px 20px; background: #16213e; border: none;
            color: #888; cursor: pointer; border-radius: 6px 6px 0 0;
            font-size: 14px; transition: all 0.2s;
        }
        .tab-btn:hover { background: #1a2747; color: #ccc; }
        .tab-btn.active { background: #0f3460; color: #00d4ff; font-weight: bold; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .device-card {
            background: #16213e; border-radius: 8px; padding: 16px;
            margin-bottom: 12px; border-left: 4px solid #0f3460;
        }
        .device-card.connected { border-left-color: #4caf50; }
        .device-card.disconnected { border-left-color: #f44336; }
        .device-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .device-name { font-size: 16px; font-weight: bold; color: #fff; }
        .device-type { color: #888; font-size: 13px; }
        .device-details { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: #aaa; }

        .module-section {
            background: #1a2747; border-radius: 6px; margin: 8px 0;
            border: 1px solid #0f3460;
        }
        .module-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; cursor: pointer; user-select: none;
        }
        .module-header:hover { background: rgba(255,255,255,0.03); }
        .module-title { font-weight: bold; color: #00d4ff; font-size: 14px; }
        .module-info { color: #888; font-size: 12px; }
        .module-body { padding: 12px 16px; border-top: 1px solid #0f3460; display: none; }
        .module-body.expanded { display: block; }

        .control-group {
            background: #16213e; border-radius: 6px; padding: 12px; margin-bottom: 8px;
        }
        .control-group h4 { color: #00d4ff; font-size: 13px; margin-bottom: 8px; }
        .control-row { display: flex; gap: 8px; align-items: center; margin: 6px 0; flex-wrap: wrap; }
        .control-row label { font-size: 12px; color: #aaa; min-width: 80px; }

        input, select {
            background: #0d1b2a; border: 1px solid #0f3460; color: #fff;
            padding: 6px 10px; border-radius: 4px; font-size: 13px;
        }
        input:focus, select:focus { outline: none; border-color: #00d4ff; }
        input[type="text"], input[type="number"] { width: 120px; }

        button {
            padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer;
            font-size: 13px; font-weight: bold; transition: all 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:active { transform: scale(0.97); }
        .btn-primary { background: #1565c0; color: white; }
        .btn-success { background: #2e7d32; color: white; }
        .btn-danger { background: #c62828; color: white; }
        .btn-warning { background: #ef6c00; color: white; }
        .btn-secondary { background: #37474f; color: white; }

        .value-display {
            background: #0d1b2a; border-radius: 4px; padding: 12px;
            font-family: 'Courier New', monospace; font-size: 18px;
            color: #69f0ae; text-align: center; margin: 8px 0;
            min-height: 48px; display: flex; align-items: center; justify-content: center;
        }

        .log-container {
            background: #0d1b2a; border-radius: 6px; padding: 12px;
            height: 300px; overflow-y: auto; font-family: 'Courier New', monospace;
            font-size: 12px; line-height: 1.5;
        }
        .log-entry { margin: 2px 0; }
        .log-info { color: #69f0ae; }
        .log-warning { color: #ffd54f; }
        .log-error { color: #ef9a9a; }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            padding: 12px 24px; border-radius: 6px; color: white;
            font-weight: bold; display: none; z-index: 1000;
        }
        .toast.success { background: #2e7d32; }
        .toast.error { background: #c62828; }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid #0f3460; border-top-color: #00d4ff;
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 999;
        }
        .modal-overlay.active { display: flex; align-items: center; justify-content: center; }
        .modal {
            background: #16213e; border-radius: 8px; padding: 24px;
            max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
        }
        .modal h3 { color: #00d4ff; margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        
        @media (max-width: 768px) {
            .container { padding: 8px; }
            .control-row { flex-direction: column; align-items: stretch; }
            input[type="text"], input[type="number"] { width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div>
            <h1>🔧 NI DAQ Controller</h1>
            <div class="status" id="statusBar">Initializing...</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <span id="deviceCount" style="font-size:13px;color:#888;">Devices: 0</span>
            <button class="btn-primary" onclick="refreshDevices()">🔄 Refresh</button>
        </div>
    </nav>

    <div class="container">
        <div class="tabs" id="tabContainer">
            <button class="tab-btn active" onclick="switchTab('dashboard', this)">📊 Dashboard</button>
        </div>
        
        <div id="dashboard" class="tab-panel active">
            <div id="deviceCards"></div>
            <div style="margin-top:16px;">
                <h3 style="color:#00d4ff;margin-bottom:8px;">📝 System Log</h3>
                <div class="log-container" id="logContainer"></div>
            </div>
        </div>
        
        <div id="devicePanels"></div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'dashboard';
        let autoRefresh = true;

        document.addEventListener('DOMContentLoaded', () => {
            refreshDevices();
            setInterval(() => { if(autoRefresh) refreshDevices(); }, 5000);
        });

        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = `toast ${type}`; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function switchTab(tabId, btn) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            if(btn) btn.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function openModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('modal').classList.add('active');
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        async function apiCall(endpoint, method='GET', body=null) {
            try {
                const opts = { method, headers: {'Content-Type': 'application/json'} };
                if(body) opts.body = JSON.stringify(body);
                const resp = await fetch(endpoint, opts);
                const data = await resp.json();
                if(!resp.ok) throw new Error(data.error || 'API error');
                return data;
            } catch(e) {
                showToast(e.message, 'error');
                return null;
            }
        }

        async function refreshDevices() {
            document.getElementById('deviceCount').innerHTML = 'Devices: <span class="spinner"></span>';
            const data = await apiCall('/api/devices');
            if(!data) return;
            
            document.getElementById('deviceCount').textContent = `Devices: ${data.devices.length}`;
            document.getElementById('statusBar').textContent = data.status;
            
            renderDashboard(data.devices);
            renderDeviceTabs(data.devices);
            updateLog(data.log);
        }

        function renderDashboard(devices) {
            const container = document.getElementById('deviceCards');
            if(devices.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;padding:60px;color:#666;">
                        <div style="font-size:48px;margin-bottom:16px;">🔌</div>
                        <h3>No NI DAQ Devices Detected</h3>
                        <p style="margin-top:8px;">Ensure devices are connected and NI-DAQmx driver is installed.</p>
                        <p style="margin-top:4px;font-size:12px;">Press Refresh (F5) to rescan.</p>
                    </div>`;
                return;
            }
            
            container.innerHTML = devices.map(d => `
                <div class="device-card ${d.status.toLowerCase()}">
                    <div class="device-header">
                        <span class="badge ${d.connection_type.toLowerCase()}">${d.connection_type}</span>
                        <span class="device-name">${d.name}</span>
                        <span class="device-type">${d.product_type}</span>
                        <span class="badge ${d.status === 'Connected' ? 'connected' : 'disconnected'}">${d.status}</span>
                    </div>
                    <div class="device-details">
                        ${d.serial_number ? `<span>S/N: ${d.serial_number}</span>` : ''}
                        ${d.ip_address ? `<span>IP: ${d.ip_address}</span>` : ''}
                        <span>Modules: ${d.module_count}</span>
                        <span>AI: ${d.ai_channels} | AO: ${d.ao_channels} | DI: ${d.di_channels} | DO: ${d.do_channels}</span>
                        ${d.is_simulated ? '<span style="color:#ff9800;">SIMULATED</span>' : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderDeviceTabs(devices) {
            const tabContainer = document.getElementById('tabContainer');
            const panelsContainer = document.getElementById('devicePanels');
            
            // Remove old device tabs (keep dashboard)
            tabContainer.querySelectorAll('.tab-btn:not(:first-child)').forEach(e => e.remove());
            panelsContainer.innerHTML = '';
            
            devices.forEach((device, idx) => {
                const tabId = `device-${idx}`;
                
                // Add tab button
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.textContent = `🔌 ${device.name.split('/')[0]}`;
                btn.onclick = () => switchTab(tabId, btn);
                tabContainer.appendChild(btn);
                
                // Build panel
                let modulesHtml = '';
                (device.modules || []).forEach((mod, mi) => {
                    let opsHtml = '';
                    
                    // AI section
                    if(mod.supported_operations.includes('AI')) {
                        opsHtml += `
                        <div class="control-group">
                            <h4>📈 Analog Input</h4>
                            <div class="control-row">
                                <label>Channels:</label>
                                <input type="text" id="ai_ch_${idx}_${mi}" value="${mod.ai_channels.slice(0,4).join(',')}" style="width:200px;">
                            </div>
                            <div class="control-row">
                                <label>Sample Rate:</label>
                                <input type="number" id="ai_rate_${idx}_${mi}" value="1000" min="1">
                                <label>Samples:</label>
                                <input type="number" id="ai_ns_${idx}_${mi}" value="100" min="1">
                            </div>
                            <div class="value-display" id="ai_val_${idx}_${mi}">-- V</div>
                            <div class="control-row">
                                <button class="btn-success" onclick="readAI(${idx},${mi})">📖 Read</button>
                                <button class="btn-primary" onclick="startAI(${idx},${mi})">▶ Continuous</button>
                                <button class="btn-danger" onclick="stopAI(${idx},${mi})">■ Stop</button>
                            </div>
                        </div>`;
                    }
                    
                    // AO section
                    if(mod.supported_operations.includes('AO')) {
                        opsHtml += `
                        <div class="control-group">
                            <h4>📤 Analog Output</h4>
                            <div class="control-row">
                                <label>Channel:</label>
                                <select id="ao_ch_${idx}_${mi}">
                                    ${mod.ao_channels.map(c => `<option value="${c}">${c.split('/').pop()}</option>`).join('')}
                                </select>
                                <label>Signal:</label>
                                <select id="ao_sig_${idx}_${mi}"><option>DC</option><option>AC</option></select>
                            </div>
                            <div class="control-row">
                                <label>Value (V):</label>
                                <input type="number" id="ao_val_${idx}_${mi}" value="1.0" step="0.1">
                                <label>Freq:</label>
                                <input type="number" id="ao_freq_${idx}_${mi}" value="60" min="1">
                            </div>
                            <div class="control-row">
                                <label>Waveform:</label>
                                <select id="ao_wf_${idx}_${mi}">
                                    <option>Sine</option><option>Square</option><option>Triangle</option><option>Sawtooth</option>
                                </select>
                                <label>Amp:</label>
                                <input type="number" id="ao_amp_${idx}_${mi}" value="1.0" step="0.1">
                            </div>
                            <div class="value-display" id="ao_val_${idx}_${mi}" style="color:#ffa726;">Output: Stopped</div>
                            <div class="control-row">
                                <button class="btn-warning" onclick="startAO(${idx},${mi})">▶ Start</button>
                                <button class="btn-danger" onclick="stopAO(${idx},${mi})">■ Stop</button>
                            </div>
                        </div>`;
                    }
                    
                    // DI/DO section
                    if(mod.supported_operations.includes('DI') || mod.supported_operations.includes('DO')) {
                        opsHtml += `
                        <div class="control-group">
                            <h4>🔲 Digital I/O</h4>
                            <div class="control-row">
                                ${mod.supported_operations.includes('DI') ? `<button class="btn-success" onclick="readDI(${idx},${mi})">📖 Read DI</button>` : ''}
                            </div>
                            <div class="value-display" id="di_val_${idx}_${mi}" style="font-size:14px;">--</div>
                            ${mod.supported_operations.includes('DO') ? `
                            <div class="control-row" id="do_btns_${idx}_${mi}">
                                ${mod.do_channels.slice(0,8).map((ch,ci) => 
                                    `<button class="btn-secondary" style="width:60px;font-size:11px;" onclick="toggleDO(${idx},${mi},${ci},'${ch}')">${ch.split('line').pop()||ch.split('/').pop()}</button>`
                                ).join('')}
                            </div>` : ''}
                        </div>`;
                    }
                    
                    modulesHtml += `
                    <div class="module-section">
                        <div class="module-header" onclick="this.nextElementSibling.classList.toggle('expanded')">
                            <span class="module-title">${mod.name}</span>
                            <span class="module-info">${mod.product_type} | Slot ${mod.slot_number} | [${mod.supported_operations.join(', ')}]</span>
                        </div>
                        <div class="module-body expanded">${opsHtml}</div>
                    </div>`;
                });
                
                const panel = document.createElement('div');
                panel.id = tabId;
                panel.className = 'tab-panel';
                panel.innerHTML = `
                    <div class="device-card ${device.status.toLowerCase()}">
                        <div class="device-header">
                            <span class="badge ${device.connection_type.toLowerCase()}">${device.connection_type}</span>
                            <span class="device-name">${device.name}</span>
                            <span class="device-type">${device.product_type}</span>
                            <span class="badge ${device.status === 'Connected' ? 'connected' : 'disconnected'}">${device.status}</span>
                        </div>
                        <div class="device-details">
                            ${device.serial_number ? `<span>S/N: ${device.serial_number}</span>` : ''}
                            ${device.ip_address ? `<span>IP: ${device.ip_address}</span>` : ''}
                            <span>Modules: ${device.modules.length}</span>
                        </div>
                    </div>
                    ${modulesHtml}
                `;
                panelsContainer.appendChild(panel);
            });
        }

        function updateLog(entries) {
            const container = document.getElementById('logContainer');
            if(!entries || !entries.length) return;
            
            entries.slice(-50).forEach(e => {
                const div = document.createElement('div');
                div.className = `log-entry log-${(e.level||'info').toLowerCase()}`;
                div.textContent = `[${e.time}] ${e.message}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        // === Analog Input Functions ===
        async function readAI(di, mi) {
            const channels = document.getElementById(`ai_ch_${di}_${mi}`).value.split(',').map(s=>s.trim());
            const rate = document.getElementById(`ai_rate_${di}_${mi}`).value;
            const samples = document.getElementById(`ai_ns_${di}_${mi}`).value;
            const result = await apiCall('/api/ai/read', 'POST', { device_idx: di, module_idx: mi, channels, rate: parseFloat(rate), samples: parseInt(samples) });
            if(result) document.getElementById(`ai_val_${di}_${mi}`).textContent = result.values.join(' | ');
        }

        async function startAI(di, mi) {
            const channels = document.getElementById(`ai_ch_${di}_${mi}`).value.split(',').map(s=>s.trim());
            const rate = document.getElementById(`ai_rate_${di}_${mi}`).value;
            const samples = document.getElementById(`ai_ns_${di}_${mi}`).value;
            const result = await apiCall('/api/ai/start', 'POST', { device_idx: di, module_idx: mi, channels, rate: parseFloat(rate), samples: parseInt(samples) });
            if(result) showToast(`Continuous AI started: ${result.task_name}`);
        }

        async function stopAI(di, mi) {
            const result = await apiCall('/api/ai/stop', 'POST', { device_idx: di, module_idx: mi });
            if(result) { showToast('AI stopped'); document.getElementById(`ai_val_${di}_${mi}`).textContent = '-- V'; }
        }

        // === Analog Output Functions ===
        async function startAO(di, mi) {
            const channel = document.getElementById(`ao_ch_${di}_${mi}`).value;
            const signal = document.getElementById(`ao_sig_${di}_${mi}`).value;
            const val = parseFloat(document.getElementById(`ao_val_${di}_${mi}`).value);
            const freq = parseFloat(document.getElementById(`ao_freq_${di}_${mi}`).value);
            const wf = document.getElementById(`ao_wf_${di}_${mi}`).value;
            const amp = parseFloat(document.getElementById(`ao_amp_${di}_${mi}`).value);
            const result = await apiCall('/api/ao/start', 'POST', { device_idx: di, module_idx: mi, channel, signal, value: val, frequency: freq, waveform: wf, amplitude: amp });
            if(result) { showToast(`Output started: ${result.task_name}`); document.getElementById(`ao_val_${di}_${mi}`).textContent = `Output: Active (${signal})`; }
        }

        async function stopAO(di, mi) {
            const result = await apiCall('/api/ao/stop', 'POST', { device_idx: di, module_idx: mi });
            if(result) { showToast('Output stopped'); document.getElementById(`ao_val_${di}_${mi}`).textContent = 'Output: Stopped'; }
        }

        // === Digital I/O Functions ===
        async function readDI(di, mi) {
            const result = await apiCall('/api/di/read', 'POST', { device_idx: di, module_idx: mi });
            if(result) document.getElementById(`di_val_${di}_${mi}`).textContent = result.values.join(' | ');
        }

        async function toggleDO(di, mi, ci, channel) {
            const result = await apiCall('/api/do/toggle', 'POST', { device_idx: di, module_idx: mi, channel });
            if(result) showToast(`${channel}: ${result.state ? 'HIGH' : 'LOW'}`);
        }
    </script>
</body>
</html>
